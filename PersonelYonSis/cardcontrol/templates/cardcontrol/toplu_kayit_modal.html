<div class="modal fade" id="topluKayitModal" tabindex="-1" aria-labelledby="topluKayitModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="topluKayitModalLabel">Toplu Kullanıcı Ekleme - {{ selected_cihaz.kapi_adi }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted">Excel'den kopyaladığınız veriyi (Ad Soyad ve Kart ID) aşağıdaki alana yapıştırabilirsiniz. Sütunların <strong>Ad Soyad</strong> ve <strong>Kart ID</strong> sırasıyla olduğuna emin olun.</p>
        <div class="mb-3">
            <textarea id="pasteArea" class="form-control" rows="4" placeholder="Ad Soyad [Tab] Kart ID şeklinde kopyaladığınız veriyi buraya yapıştırın..."></textarea>
        </div>
        
        <div class="table-responsive mb-3" style="max-height: 300px; overflow-y: auto;">
            <table class="table table-bordered table-sm" id="bulkTable">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Ad Soyad</th>
                        <th>Kart ID</th>
                        <th>Durum</th>
                    </tr>
                </thead>
                <tbody id="bulkTableBody">
                    <tr>
                        <td colspan="4" class="text-center text-muted">Henüz veri yok. Yapıştırılan veriler burada görünecektir.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="progress d-none" id="bulkProgressContainer">
            <div id="bulkProgressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="btnBulkCancel">Kapat</button>
        <button type="button" class="btn btn-primary" id="btnBulkSave" disabled>Kaydet</button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const pasteArea = document.getElementById('pasteArea');
    const bulkTableBody = document.getElementById('bulkTableBody');
    const btnBulkSave = document.getElementById('btnBulkSave');
    const btnBulkCancel = document.getElementById('btnBulkCancel');
    const progressBar = document.getElementById('bulkProgressBar');
    const progressContainer = document.getElementById('bulkProgressContainer');
    
    let parsedData = [];
    
    pasteArea.addEventListener('input', function(e) {
        const text = pasteArea.value.trim();
        if (!text) return;
        
        const lines = text.split('\n');
        
        lines.forEach(line => {
            const parts = line.split('\t');
            if (parts.length >= 2) {
                const name = parts[0].trim();
                const cardId = parts[1].trim();
                if (name && cardId) {
                    parsedData.push({name: name, card_id: cardId, status: 'Bekliyor'});
                }
            }
        });
        
        renderTable();
        pasteArea.value = ''; // Clear after parse
    });
    
    function renderTable() {
        bulkTableBody.innerHTML = '';
        if (parsedData.length === 0) {
            bulkTableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Henüz veri yok. Yapıştırılan veriler burada görünecektir.</td></tr>';
            btnBulkSave.disabled = true;
            return;
        }
        
        btnBulkSave.disabled = false;
        parsedData.forEach((row, index) => {
            let statusClass = '';
            let statusIcon = '';
            if (row.status === 'Başarılı') {
                statusClass = 'table-success';
                statusIcon = '<i class="bi bi-check-circle-fill text-success"></i>';
            } else if (row.status.startsWith('Hata')) {
                statusClass = 'table-danger';
                statusIcon = '<i class="bi bi-exclamation-triangle-fill text-danger"></i>';
            } else if (row.status === 'Bekliyor') {
                statusIcon = '<i class="bi bi-hourglass-split text-warning"></i>';
            } else if (row.status === 'İşleniyor...') {
                statusClass = 'table-warning';
                statusIcon = '<span class="spinner-border spinner-border-sm text-primary" role="status" aria-hidden="true"></span>';
            }
            
            bulkTableBody.innerHTML += `
                <tr id="row-${index}" class="${statusClass}">
                    <td>${index + 1}</td>
                    <td>${row.name}</td>
                    <td>${row.card_id}</td>
                    <td class="status-cell">${statusIcon} <span class="ms-1">${row.status}</span></td>
                </tr>
            `;
        });
    }

    btnBulkSave.addEventListener('click', async function() {
        if (parsedData.length === 0) return;
        
        btnBulkSave.disabled = true;
        btnBulkCancel.disabled = true;
        progressContainer.classList.remove('d-none');
        
        let successCount = 0;
        let total = parsedData.length;
        
        for (let i = 0; i < total; i++) {
            let row = parsedData[i];
            
            // Sabit bir ilerleme gösterme
            let pct = Math.round(((i) / total) * 100);
            progressBar.style.width = pct + '%';
            progressBar.textContent = pct + '%';
            
            if (row.status !== 'Başarılı') {
                row.status = 'İşleniyor...';
                renderTable(); // Yalnızca ilgili satırı render etmek daha verimli olabilir ama basitlik açısından tamamını render ediyoruz
                
                // Satıra scroll
                const rowElement = document.getElementById(`row-${i}`);
                if (rowElement) {
                    rowElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }

                try {
                    const response = await fetch(`/cardcontrol/api-kullanici-ekle/{{ selected_cihaz.id }}/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify({
                            name: row.name,
                            card_id: row.card_id
                        })
                    });
                    
                    const resData = await response.json();
                    if (resData.status === 'success') {
                        row.status = 'Başarılı';
                        successCount++;
                    } else {
                        row.status = 'Hata: ' + resData.message;
                    }
                } catch (error) {
                    row.status = 'Hata: Bağlantı sorunu';
                }
                
                renderTable();
            }
        }
        
        progressBar.style.width = '100%';
        progressBar.textContent = '100% Tamamlandı';
        btnBulkSave.disabled = false;
        btnBulkCancel.disabled = false;
        btnBulkCancel.textContent = "Kapat / Geri Dön";
        
        if (successCount > 0) {
            alert(successCount + " kullanıcı cihaza ve veritabanına başarıyla eklendi.");
            // Sayfayı yenilemek iyi olabilir
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        }
    });

    // Modal kapanınca state sıfırlamak istenebilir
    const modalEl = document.getElementById('topluKayitModal');
    modalEl.addEventListener('hidden.bs.modal', function (event) {
        if (progressBar.textContent === '100% Tamamlandı' && successCount > 0) {
            window.location.reload();
        } else {
            // İsteğe bağlı, modal kapanınca silinsin mi?
            // parsedData = [];
            // renderTable();
            // progressContainer.classList.add('d-none');
        }
    });
});
</script>
