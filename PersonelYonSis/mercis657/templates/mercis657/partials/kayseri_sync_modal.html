<!-- Kayseri Sync Detail Modal -->
<div class="modal fade" id="kayseriSyncModal" tabindex="-1" aria-labelledby="kayseriSyncModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-danger text-white border-0">
        <h5 class="modal-title" id="kayseriSyncModalLabel"><i class="bi bi-exclamation-triangle-fill me-2"></i>Kayseri Entegrasyon Detayı</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Kapat"></button>
      </div>
      <div class="modal-body p-4">
        <div class="alert alert-light border shadow-sm">
            <p id="kayseriSyncDurumMesaj" class="mb-0 fw-bold text-secondary">Durum mesajı...</p>
        </div>
        
        <div id="kayseriSyncEslesmeyenlerContainer" class="d-none mt-4">
          <h6 class="fw-bold text-danger border-bottom pb-2 mb-3"><i class="bi bi-people-fill me-2"></i>Eşleşmeyen Personeller</h6>
          <div class="table-responsive rounded shadow-sm border">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th class="ps-3">TCKN</th>
                  <th>Sebep</th>
                </tr>
              </thead>
              <tbody id="kayseriSyncEslesmeyenlerBody">
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="modal-footer bg-light border-0 d-flex justify-content-between">
          <button type="button" class="btn btn-outline-primary shadow-sm px-4" id="kayseriSyncRetryModalBtn">
            <i class="bi bi-arrow-repeat me-1"></i> Yeniden Dene
          </button>
          <button type="button" class="btn btn-secondary shadow-sm px-4" data-bs-dismiss="modal">Kapat</button>
      </div>
    </div>
  </div>
</div>
